apiVersion: apps/v1
kind: Deployment
metadata:
  name: scloud-dns
  namespace: scloud-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scloud-dns
  template:
    metadata:
      labels:
        app: scloud-dns
    spec:
      serviceAccountName: scloud-dns
      automountServiceAccountToken: true
      volumes:
        - name: logs
          emptyDir: {}
      containers:
        - name: scloud-dns
          image: ghcr.io/2scloud/scloud-dns:0.2.3-live-stdout
          imagePullPolicy: Always
          resources:
            requests:
              memory: "256Mi"
              ephemeral-storage: "500Mi"
            limits:
              memory: "512Mi"
              ephemeral-storage: "1Gi"
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          volumeMounts:
            - name: logs
              mountPath: /var/log/scloud-dns
          env:
            - name: OTEL_SERVICE_NAME
              value: "scloud-dns"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.scloud-observability.svc:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_EXPORTER_OTLP_LOGS_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=scloud-dns,service.version=0.2.1"
            - name: OTEL_TRACES_EXPORTER
              value: "none"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
---
apiVersion: v1
kind: Service
metadata:
  name: scloud-dns
  namespace: scloud-dns
spec:
  selector:
    app: scloud-dns
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
  type: ClusterIP